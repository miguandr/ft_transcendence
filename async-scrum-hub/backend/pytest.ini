[pytest]
# Pytest configuration for async-scrum-hub backend

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Minimum version
minversion = 7.0

# Add project root to Python path
pythonpath = .

# Show extra test summary info
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for organizing tests
markers =
    unit: Unit tests (no database required)
    integration: Integration tests (requires database)
    slow: Slow running tests
    models: Tests for database models
    api: Tests for API endpoints
    services: Tests for service layer
    live_email: Live tests that send real emails over SMTP (requires network + valid SMTP credentials)
